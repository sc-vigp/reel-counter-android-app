name: Build and Release APK

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    permissions:
      contents: read  # Required for actions/checkout
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Run unit tests
        run: ./gradlew test --stacktrace
      
      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace
      
      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace
      
      - name: Get version information
        id: version_info
        run: |
          # Extract version from build.gradle.kts
          # Note: This expects the format 'versionName = "X.Y"' and 'versionCode = N'
          VERSION_NAME=$(grep "versionName" app/build.gradle.kts | sed 's/.*versionName = "\(.*\)"/\1/')
          VERSION_CODE=$(grep "versionCode" app/build.gradle.kts | sed 's/.*versionCode = \(.*\)/\1/')
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "version_code=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "commit_short=${COMMIT_SHORT}" >> $GITHUB_OUTPUT
          echo "release_name=v${VERSION_NAME}-${COMMIT_SHORT}" >> $GITHUB_OUTPUT
      
      - name: Rename APK files
        run: |
          # Copy APK files with version and commit info (keeping originals for reference)
          # Debug APK
          cp app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/ReelCounter-${{ steps.version_info.outputs.version_name }}-debug-${{ steps.version_info.outputs.commit_short }}.apk
          
          # Release APK
          cp app/build/outputs/apk/release/app-release-unsigned.apk \
             app/build/outputs/apk/release/ReelCounter-${{ steps.version_info.outputs.version_name }}-release-${{ steps.version_info.outputs.commit_short }}.apk
      
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ReelCounter-debug-${{ steps.version_info.outputs.release_name }}
          path: app/build/outputs/apk/debug/ReelCounter-${{ steps.version_info.outputs.version_name }}-debug-${{ steps.version_info.outputs.commit_short }}.apk
          retention-days: 30
      
      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: ReelCounter-release-${{ steps.version_info.outputs.release_name }}
          path: app/build/outputs/apk/release/ReelCounter-${{ steps.version_info.outputs.version_name }}-release-${{ steps.version_info.outputs.commit_short }}.apk
          retention-days: 90
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: app/build/test-results/
          retention-days: 7
      
      - name: Create Release Summary
        run: |
          echo "## Build Information" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version Name**: ${{ steps.version_info.outputs.version_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version Code**: ${{ steps.version_info.outputs.version_code }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ steps.version_info.outputs.commit_short }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Time**: ${{ steps.version_info.outputs.timestamp }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### APK Files" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Debug APK: ReelCounter-${{ steps.version_info.outputs.version_name }}-debug-${{ steps.version_info.outputs.commit_short }}.apk" >> $GITHUB_STEP_SUMMARY
          echo "- Release APK: ReelCounter-${{ steps.version_info.outputs.version_name }}-release-${{ steps.version_info.outputs.commit_short }}.apk" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Download" >> $GITHUB_STEP_SUMMARY
          echo "APK files are available as artifacts in this workflow run." >> $GITHUB_STEP_SUMMARY
